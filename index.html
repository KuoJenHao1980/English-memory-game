<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>田禾棣翻牌記憶遊戲</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Georgia,serif;background:#f5f0e8;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1rem;}
#app{width:100%;max-width:680px;}
.screen{display:none;}
.screen.active{display:block;}

/* ── Setup ── */
.game-title{font-size:26px;font-weight:700;color:#1a3a6b;text-align:center;margin:1.2rem 0 0.3rem;letter-spacing:0.04em;}
.subtitle{font-size:14px;color:#888;text-align:center;margin-bottom:1.5rem;font-family:sans-serif;}
.level-cards{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:1.4rem;}
.level-card{background:#fff;border:1.5px solid #d0cabb;border-radius:12px;padding:1rem 2rem;cursor:pointer;text-align:center;transition:border-color 0.15s,background 0.15s;min-width:110px;}
.level-card:hover{background:#f0ece0;border-color:#a09880;}
.level-card.selected{border:2px solid #5DCAA5;background:#E1F5EE;}
.level-card .lc-title{font-weight:700;font-size:16px;color:#1a3a6b;}
.level-card .lc-sub{font-size:13px;color:#888;margin-top:3px;font-family:sans-serif;}
.level-card.selected .lc-title,.level-card.selected .lc-sub{color:#085041;}
.player-inputs{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:1.5rem;}
.player-input-group{display:flex;flex-direction:column;gap:6px;align-items:center;}
.player-input-group label{font-size:13px;font-weight:700;font-family:sans-serif;}
.p1-label{color:#185FA5;}.p2-label{color:#993C1D;}
.player-input-group input{border:1.5px solid #c8c0b0;border-radius:8px;padding:8px 14px;font-size:15px;font-family:Georgia,serif;background:#fff;color:#1a3a6b;text-align:center;width:148px;outline:none;}
.player-input-group input:focus{border-color:#5DCAA5;}
.btn-main{display:block;margin:0 auto;background:#1a3a6b;border:none;border-radius:10px;padding:12px 40px;font-size:17px;font-family:Georgia,serif;color:#fff;cursor:pointer;font-weight:700;letter-spacing:0.04em;transition:background 0.15s;}
.btn-main:hover{background:#2a5090;}

/* ── Scoreboard ── */
.scoreboard{display:flex;gap:12px;justify-content:center;margin-bottom:0.75rem;flex-wrap:wrap;}
.score-card{background:#fff;border-radius:10px;padding:0.7rem 1.4rem;text-align:center;min-width:145px;border:2px solid transparent;transition:border-color 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.07);}
.score-card.active-turn{border-color:#1D9E75;}
.score-card .sc-name{font-size:13px;font-weight:700;color:#888;margin-bottom:2px;font-family:sans-serif;}
.score-card .sc-score{font-size:30px;font-weight:700;color:#1a3a6b;}
.score-card .sc-turn-label{font-size:11px;color:#0F6E56;margin-top:2px;height:14px;font-family:sans-serif;}
.turn-info{text-align:center;margin-bottom:0.75rem;font-size:14px;color:#888;font-family:sans-serif;}
.turn-name{font-weight:700;color:#1a3a6b;}

/* ── Grid ── */
.grid-wrap{display:flex;justify-content:center;margin-bottom:1.25rem;overflow-x:auto;padding:4px;}
.card-grid{display:grid;}

/* ── Card flip ── */
.card-wrapper{perspective:700px;cursor:pointer;}
.card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform 0.45s cubic-bezier(0.45,0.05,0.55,0.95);}
.card-wrapper.flipped .card-inner{transform:rotateY(180deg);}
.card-wrapper.matched{cursor:default;opacity:0.28;}
.card-wrapper.matched .card-inner{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;border-radius:12px;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden;border:1.5px solid rgba(0,0,0,0.13);}
.card-back-face{background:#1a3a6b;}
.card-front-face{background:#fffef8;transform:rotateY(180deg);display:flex;flex-direction:column;align-items:center;justify-content:center;}
.card-letter{font-family:Georgia,serif;font-weight:700;line-height:1;color:#1a3a6b;}
.card-icon{line-height:1;display:block;}
.card-word{font-family:Georgia,serif;font-weight:700;color:#c0392b;letter-spacing:0.02em;margin-top:3px;line-height:1.1;text-align:center;}

/* ── Buttons ── */
.btn-sm{display:block;margin:0 auto;background:#fff;border:1.5px solid #d0cabb;border-radius:8px;padding:8px 22px;font-size:14px;font-family:Georgia,serif;color:#1a3a6b;cursor:pointer;transition:background 0.15s;}
.btn-sm:hover{background:#f0ece0;}

/* ── Result ── */
.result-box{background:#fff;border-radius:16px;padding:2rem;text-align:center;max-width:360px;margin:1rem auto 1.5rem;box-shadow:0 2px 12px rgba(0,0,0,0.1);}
.result-box .winner-emoji{font-size:48px;margin-bottom:0.5rem;}
.result-box .winner-text{font-size:22px;font-weight:700;color:#1a3a6b;margin-bottom:0.75rem;}
.result-box .score-line{font-size:15px;color:#888;margin-bottom:0.25rem;font-family:sans-serif;}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
</style>
</head>
<body>
<div id="app">

<!-- SETUP -->
<div id="screen-setup" class="screen active">
  <p class="game-title">田禾棣翻牌記憶遊戲</p>
  <p class="subtitle">兩人輪流翻牌，找到最多配對的玩家獲勝</p>
  <div class="level-cards">
    <div class="level-card selected" onclick="selectLevel(this,3)">
      <div class="lc-title">初級</div><div class="lc-sub">3 × 3</div>
    </div>
    <div class="level-card" onclick="selectLevel(this,4)">
      <div class="lc-title">中級</div><div class="lc-sub">4 × 4</div>
    </div>
    <div class="level-card" onclick="selectLevel(this,5)">
      <div class="lc-title">高級</div><div class="lc-sub">5 × 5</div>
    </div>
  </div>
  <div class="player-inputs">
    <div class="player-input-group">
      <label class="p1-label">玩家 1</label>
      <input id="p1-name" type="text" value="玩家一" maxlength="10"/>
    </div>
    <div class="player-input-group">
      <label class="p2-label">玩家 2</label>
      <input id="p2-name" type="text" value="玩家二" maxlength="10"/>
    </div>
  </div>
  <button class="btn-main" onclick="startGame()">開始遊戲</button>
</div>

<!-- GAME -->
<div id="screen-game" class="screen">
  <p class="game-title" style="font-size:20px;margin:0.8rem 0 0.6rem;">田禾棣翻牌記憶遊戲</p>
  <div class="scoreboard">
    <div class="score-card" id="sc1">
      <div class="sc-name" id="sc1-name">玩家一</div>
      <div class="sc-score" id="sc1-score">0</div>
      <div class="sc-turn-label" id="sc1-turn"></div>
    </div>
    <div class="score-card" id="sc2">
      <div class="sc-name" id="sc2-name">玩家二</div>
      <div class="sc-score" id="sc2-score">0</div>
      <div class="sc-turn-label" id="sc2-turn"></div>
    </div>
  </div>
  <div class="turn-info">輪到 <span class="turn-name" id="turn-name"></span> 翻牌</div>
  <div class="grid-wrap"><div class="card-grid" id="card-grid"></div></div>
  <button class="btn-sm" onclick="goSetup()">回到選單</button>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen">
  <p class="game-title" style="font-size:20px;margin:1rem 0 1rem;">田禾棣翻牌記憶遊戲</p>
  <div class="result-box">
    <div class="winner-emoji" id="res-emoji"></div>
    <div class="winner-text" id="res-winner"></div>
    <div class="score-line" id="res-score1"></div>
    <div class="score-line" id="res-score2"></div>
  </div>
  <div class="btn-row">
    <button class="btn-sm" onclick="startGame()">再玩一局</button>
    <button class="btn-sm" onclick="goSetup()">更換設定</button>
  </div>
</div>

</div><!-- /app -->

// ── Build unified card pool: each letter has 3 variants ──────────────────────
const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
function getVariants(letter) {
  const animal = ANIMAL_HEADS[letter];
  const food   = OTHER_ICONS[letter+'_food'];
  const life   = OTHER_ICONS[letter+'_life'];
  const result = [];
  if (animal) result.push({letter, word: animal.word,  icon: animal.icon,  viewbox:80});
  if (food)   result.push({letter, word: food.word,    icon: food.icon,    viewbox:40});
  if (life)   result.push({letter, word: life.word,    icon: life.icon,    viewbox:40});
  if (result.length === 0) result.push({letter, word: letter, icon:(s)=>`<svg width="${s}" height="${s}" viewBox="0 0 40 40"><text x="20" y="28" text-anchor="middle" font-size="24" fill="#1a3a6b">${letter}</text></svg>`, viewbox:40});
  return result;
}

// ── State ────────────────────────────────────────────────────────────────────
let gridSize=3, currentPlayer=0, scores=[0,0];
let names=['玩家一','玩家二'];
let flipped=[], matched=[], cards=[], cardData=[], locked=false;
let audioCtx=null;

// ── Audio ────────────────────────────────────────────────────────────────────
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playSwish(){
  try{
    const ctx=getAudio(),sr=ctx.sampleRate,dur=0.18;
    const buf=ctx.createBuffer(1,Math.floor(sr*dur),sr);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++){const t=i/d.length;d[i]=(Math.random()*2-1)*(t<0.3?t/0.3:(1-t)/0.7)*0.22;}
    const src=ctx.createBufferSource();src.buffer=buf;
    const lpf=ctx.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=1200;
    const hpf=ctx.createBiquadFilter();hpf.type='highpass';hpf.frequency.value=300;
    const g=ctx.createGain();g.gain.setValueAtTime(1,ctx.currentTime);
    src.connect(hpf);hpf.connect(lpf);lpf.connect(g);g.connect(ctx.destination);
    src.start();src.stop(ctx.currentTime+dur+0.05);
    setTimeout(()=>{try{const c2=getAudio(),b2=c2.createBuffer(1,Math.floor(sr*0.14),sr),d2=b2.getChannelData(0);for(let i=0;i<d2.length;i++){const t=i/d2.length;d2[i]=(Math.random()*2-1)*(t<0.4?t/0.4:(1-t)/0.6)*0.16;}const s2=c2.createBufferSource();s2.buffer=b2;const lp2=c2.createBiquadFilter();lp2.type='lowpass';lp2.frequency.value=1000;const hp2=c2.createBiquadFilter();hp2.type='highpass';hp2.frequency.value=350;const g2=c2.createGain();g2.gain.setValueAtTime(0.8,c2.currentTime);s2.connect(hp2);hp2.connect(lp2);lp2.connect(g2);g2.connect(c2.destination);s2.start();s2.stop(c2.currentTime+0.16);}catch(e){}},120);
  }catch(e){}
}
function playMatch(){
  try{const ctx=getAudio(),t=ctx.currentTime;[523,659,784,1047].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.setValueAtTime(f,t+i*0.13);g.gain.setValueAtTime(0.18,t+i*0.13);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.13+0.22);o.start(t+i*0.13);o.stop(t+i*0.13+0.25);});}catch(e){}
}

// ── Card back SVG ────────────────────────────────────────────────────────────
function makeBack(w,h){
  const ts=14,pad=5,r=10;let p='';
  for(let row=-1;row<=Math.ceil(h/ts)+1;row++)for(let col=-1;col<=Math.ceil(w/ts)+1;col++){const cx=col*ts+(row%2===0?0:ts/2),cy=row*ts*0.6;p+=`<polygon points="${cx},${cy-ts*0.38} ${cx+ts*0.5},${cy} ${cx},${cy+ts*0.38} ${cx-ts*0.5},${cy}" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.13)" stroke-width="0.5"/>`;}
  return'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><defs><clipPath id="cp"><rect rx="${r}" width="${w}" height="${h}"/></clipPath></defs><rect width="${w}" height="${h}" rx="${r}" fill="#1a3a6b"/><g clip-path="url(#cp)">${p}</g><rect x="${pad}" y="${pad}" width="${w-pad*2}" height="${h-pad*2}" rx="${r-2}" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.2"/><rect x="${pad+4}" y="${pad+4}" width="${w-pad*2-8}" height="${h-pad*2-8}" rx="${r-4}" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.8"/></svg>`);
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function selectLevel(el,size){document.querySelectorAll('.level-card').forEach(c=>c.classList.remove('selected'));el.classList.add('selected');gridSize=size;}
function goSetup(){showScreen('screen-setup');}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

// ── Start game ───────────────────────────────────────────────────────────────
function startGame(){
  names[0]=document.getElementById('p1-name').value.trim()||'玩家一';
  names[1]=document.getElementById('p2-name').value.trim()||'玩家二';
  currentPlayer=0;scores=[0,0];flipped=[];matched=[];locked=false;

  const total=gridSize*gridSize,pairs=Math.floor(total/2);
  const chosenLetters=shuffle([...LETTERS]).slice(0,pairs);
  const pairEntries=chosenLetters.map(letter=>{
    const variants=getVariants(letter);
    return variants[Math.floor(Math.random()*variants.length)];
  });
  const fullSet=[...pairEntries,...pairEntries];
  if(total%2===1){
    const used=new Set(chosenLetters);
    const wildLetter=LETTERS.find(l=>!used.has(l))||'Z';
    const wv=getVariants(wildLetter);
    fullSet.push({...wv[Math.floor(Math.random()*wv.length)],letter:wildLetter+'_wild'});
  }
  cardData=shuffle(fullSet);
  cards=cardData.map(d=>d.letter);

  document.getElementById('sc1-name').textContent=names[0];
  document.getElementById('sc2-name').textContent=names[1];
  updateTurnUI();

  const cardSize=gridSize===5?84:gridSize===4?100:118;
  const letterSz=gridSize===5?22:gridSize===4?27:34;
  const iconSz=gridSize===5?30:gridSize===4?38:46;
  const wordSz=gridSize===5?10:gridSize===4?12:15;
  const backURL=makeBack(cardSize,cardSize);

  const grid=document.getElementById('card-grid');
  grid.style.gridTemplateColumns=`repeat(${gridSize},${cardSize}px)`;
  grid.style.gap='8px';grid.innerHTML='';

  cardData.forEach((d,i)=>{
    const wrapper=document.createElement('div');
    wrapper.className='card-wrapper';
    wrapper.style.width=cardSize+'px';wrapper.style.height=cardSize+'px';
    const inner=document.createElement('div');inner.className='card-inner';
    const back=document.createElement('div');
    back.className='card-face card-back-face';
    back.style.backgroundImage=`url("${backURL}")`;back.style.backgroundSize='cover';
    const front=document.createElement('div');front.className='card-face card-front-face';
    front.innerHTML=`<span class="card-letter" style="font-size:${letterSz}px;margin-bottom:2px">${d.letter.replace('_wild','')}</span><span class="card-icon" style="margin-bottom:3px">${d.icon(iconSz)}</span><span class="card-word" style="font-size:${wordSz}px">${d.word}</span>`;
    inner.appendChild(back);inner.appendChild(front);wrapper.appendChild(inner);
    wrapper.addEventListener('click',()=>flipCard(i));
    grid.appendChild(wrapper);
  });
  showScreen('screen-game');
}

function updateTurnUI(){
  document.getElementById('turn-name').textContent=names[currentPlayer];
  document.getElementById('sc1').classList.toggle('active-turn',currentPlayer===0);
  document.getElementById('sc2').classList.toggle('active-turn',currentPlayer===1);
  document.getElementById('sc1-turn').textContent=currentPlayer===0?'本輪翻牌中':'';
  document.getElementById('sc2-turn').textContent=currentPlayer===1?'本輪翻牌中':'';
  document.getElementById('sc1-score').textContent=scores[0];
  document.getElementById('sc2-score').textContent=scores[1];
}

function flipCard(index){
  if(locked||matched.includes(index)||flipped.includes(index)||flipped.length>=2)return;
  playSwish();
  const ws=document.querySelectorAll('.card-wrapper');
  ws[index].classList.add('flipped');flipped.push(index);
  if(flipped.length===2){
    locked=true;const[a,b]=flipped;
    if(cards[a]===cards[b]){
      setTimeout(()=>{
        playMatch();
        ws[a].classList.add('matched');ws[b].classList.add('matched');
        matched.push(a,b);scores[currentPlayer]++;
        flipped=[];locked=false;updateTurnUI();
        if(matched.length>=Math.floor(cards.length/2)*2)setTimeout(showResult,500);
      },600);
    }else{
      setTimeout(()=>{
        playSwish();
        ws[a].classList.remove('flipped');ws[b].classList.remove('flipped');
        flipped=[];locked=false;
        currentPlayer=currentPlayer===0?1:0;updateTurnUI();
      },1800);
    }
  }
}

function showResult(){
  const[s1,s2]=scores;let emoji,text;
  if(s1>s2){emoji='🏆';text=names[0]+' 獲勝！';}
  else if(s2>s1){emoji='🏆';text=names[1]+' 獲勝！';}
  else{emoji='🤝';text='平手！勢均力敵！';}
  document.getElementById('res-emoji').textContent=emoji;
  document.getElementById('res-winner').textContent=text;
  document.getElementById('res-score1').textContent=names[0]+'：'+s1+' 對';
  document.getElementById('res-score2').textContent=names[1]+'：'+s2+' 對';
  showScreen('screen-result');
}
</script>
